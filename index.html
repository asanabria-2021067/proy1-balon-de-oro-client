<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balon de Oro Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page">
    <aside class="sidebar">
        <div class="sidebar__logo">PREMIOS</div>
        <nav class="sidebar__nav">
            <button id="nav-ceremonies" class="sidebar__link sidebar__link--active">Ceremonias</button>
            <button id="nav-players" class="sidebar__link">Jugadores</button>
            <button id="nav-stats" class="sidebar__link">Estadísticas</button>
        </nav>
        <div class="sidebar__footer">
            <button id="btn-export-csv" class="btn btn--outline btn--sm">Exportar en CSV</button>
            <button id="btn-export-excel" class="btn btn--outline btn--sm">Exportar en Excel</button>
        </div>
    </aside>

    <main id="app-content" class="main-content">
        <section id="view-ceremonies" class="view">
            <div id="hero-section" class="hero">
            </div>
            
            <div class="container">
                <div id="year-selector" class="year-selector">
                </div>
                <div id="top-10-grid" class="grid">
                </div>
            </div>
        </section>

        <section id="view-players" class="view view--hidden">
            <div class="container">
                <div class="admin-header">
                    <div class="search-box">
                        <input type="text" id="player-search" class="search-box__input" placeholder="Buscar jugadores...">
                    </div>
                    <select id="player-sort" class="form-select">
                        <option value="">Sin ordenar</option>
                        <option value="name-asc">Nombre A-Z</option>
                        <option value="name-desc">Nombre Z-A</option>
                        <option value="wins-desc">Más premios</option>
                    </select>
                    <button id="btn-add-player" class="btn btn--primary">Agregar jugador</button>
                </div>
                <div id="players-grid" class="grid">
                </div>
                <div id="players-pagination"></div>
            </div>
        </section>

        <section id="stats-view" class="view view--hidden">
        </section>
    </main>

    <div id="modal-container" class="modal modal--hidden">
        <div class="modal__backdrop"></div>
        <div class="modal__content">
            <button id="modal-close" class="modal__close">&times;</button>
            <div id="modal-body" class="modal__body"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
